---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  labels:
    app: todonodejs
    name: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todonodejs
      name: mysql
  template:
    metadata:
      labels:
        app: todonodejs
        name: mysql
    spec:
      containers:
      - image: central-quay-registry.apps.ocp4.example.com/repository/finance/budget-app-dev:1
        name: mysql
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: r00tpa55
        - name: MYSQL_USER
          value: user1
        - name: MYSQL_PASSWORD
          value: mypa55
        - name: MYSQL_DATABASE
          value: items
        ports:
        - containerPort: 3306
          name: mysql
        imagePullSecret:
          - name: finance-dev-deployer-pull-secret
        volumeMounts:
          - mountPath: "/var/lib/mysql"
            name: db-volume
      volumes:
      - name: db-volume
        emptyDir: {}
      - name: db-init
        emptyDir: {}
